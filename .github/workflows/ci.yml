name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Rust checks
        run: |
          cargo fmt --check
          cargo clippy -- -D warnings
      - name: Build and test
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install maturin pytest
          maturin develop
          pytest tests/ -v

  build-wheel-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build glibc wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - uses: actions/upload-artifact@v5
        with:
          name: wheel-linux
          path: dist/

  build-wheel-musl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build musllinux wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64-unknown-linux-musl
          args: --release --out dist -i python3.12
          manylinux: musllinux_1_2
      - uses: actions/upload-artifact@v5
        with:
          name: wheel-musllinux
          path: dist/

  build-wheel-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build macOS ARM wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - uses: actions/upload-artifact@v5
        with:
          name: wheel-macos
          path: dist/

  build-wheel-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build Windows wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
      - uses: actions/upload-artifact@v5
        with:
          name: wheel-windows
          path: dist/
