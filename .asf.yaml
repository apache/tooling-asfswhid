github:
  description: "Python bindings for the swhid-rs SWHID v1.2 reference implementation (ISO/IEC 18670:2025)"
  homepage: https://tooling.apache.org/
  del_branch_on_merge: true
  features:
    issues: true
    discussions: true
  enabled_merge_buttons:
    squash:  true
    squash_commit_message: DEFAULT
    merge:   false
    rebase:  true
  custom_subjects:
    new_pr: "[PR] {title} ({repository})"
    close_pr: "Re: [PR] {title} ({repository})"
    comment_pr: "Re: [PR] {title} ({repository})"
    merge_pr: "Re: [PR] {title} ({repository})"
    new_issue: "[I] {title} ({repository})"
    comment_issue: "Re: [I] {title} ({repository})"
    close_issue: "Re: [I] {title} ({repository})"
    catchall: "[GH] {title} ({repository})"
  protected_branches:
    main: {}
  environments:
    pypi:
      required_reviewers:
        - id: andrewmusselman
          type: User
        - id: sbp
          type: User
        - id: dave2wave
          type: User
        - id: alitheg
          type: User
      wait_timer: 5
      prevent_self_review: true
      deployment_branch_policy:
        protected_branches: false
        policies:
          - name: "v*"
            type: tag

notifications:
  commits:      commits@tooling.apache.org
  issues:       dev@tooling.apache.org
  pullrequests: dev@tooling.apache.org
  discussions:  dev@tooling.apache.org
